
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>ECG Reports System Pro V37</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    
    <script>
        window.XLSX = {}; 
        var exports = undefined;
        var module = undefined;
    </script>

    <script src="xlsx.full.min.js"></script>
    <script src="lib/docx.js"></script>
    <script src="lib/FileSaver.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        :root {
            --dark-blue: #0b2b4a;
            --mid-blue: #1e40af;
            --accent-blue: #2563eb;
            --success-green: #198754;
            --word-blue: #2b5797;
            /* مقاسات الفونت الموحدة */
            --font-data: 14px;
            --font-header: 21px; 
        }

        body { 
            background: #e2e8f0; 
            font-family: 'Cairo', sans-serif; 
            margin: 0; padding: 0; min-height: 100vh;
        }

        /* --- شاشة التفعيل --- */
        #activation-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #ffffff; z-index: 9999;
            display: none; flex-direction: column; align-items: center; justify-content: center;
        }
        .machine-id-box { background: #f5f5f5; padding: 15px; border-radius: 5px; color: #ef4444; font-size: 28px; font-weight: bold; margin-bottom: 25px; border: 1px solid #ddd; }

        /* --- الواجهة الرئيسية --- */
        .app-container { max-width: 1400px; margin: 20px auto; padding: 0 20px; }

        /* --- الجزء العلوي (Control Panel) --- */
        .premium-input-card {
            background: linear-gradient(180deg, var(--dark-blue) 0%, var(--mid-blue) 100%);
            border-radius: 20px; padding: 25px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            margin-bottom: 30px; color: white;
        }

        .unified-layout {
            display: flex; gap: 15px; align-items: flex-end; justify-content: center;
        }

        .input-item { display: flex; flex-direction: column; gap: 5px; }
        .label-style { font-weight: 700; font-size: 13px; color: #cbd5e1; margin-bottom: 3px; }

        /* توحيد أحجام الخانات والتحكم */
        .custom-control {
            height: 50px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.3);
            padding: 8px 15px; background: white; color: #333; font-size: 15px; outline: none;
        }
        #filterInput { font-weight: bold; text-align: center; color: var(--accent-blue); width: 150px; }

        /* توحيد أحجام الأزرار الخمسة (View, PDF, Word) */
        .btn-premium {
            height: 50px; min-width: 140px; border-radius: 12px; border: none;
            font-weight: 700; font-size: 15px; display: flex; align-items: center;
            justify-content: center; gap: 8px; cursor: pointer; transition: 0.2s;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }
        .btn-view { background: var(--accent-blue); color: white; }
        .btn-pdf { background: var(--success-green); color: white; }
        .btn-word { background: var(--word-blue); color: white; }
        .btn-premium:hover { transform: translateY(-2px); filter: brightness(1.1); }

        /* --- الجداول الموحدة (شاشة + PDF) --- */
        .report-card { background: white; border-radius: 16px; margin-top: 25px; overflow: hidden; border: 2px solid #000; }
        .dynamic-header { 
            background: #f1f5f9 !important; color: #004085; padding: 15px; text-align: center; 
            font-size: 26px; font-weight: bold; border-bottom: 3px solid #004085;
            -webkit-print-color-adjust: exact; print-color-adjust: exact;
        }
        
        table { width: 100%; border-collapse: collapse; table-layout: fixed; direction: rtl; }
        
        /* رؤوس الأعمدة: ارتفاع 40 */
        th { 
            background-color: #004085 !important; color: white !important; 
            height: 40px; font-size: var(--font-header); font-weight: bold !important;
            text-align: center; border: 1px solid #000;
            -webkit-print-color-adjust: exact; print-color-adjust: exact;
        }
        
        /* السطور العادية: ارتفاع 25 */
        td { 
            height: 25px; font-size: var(--font-data); font-weight: bold !important;
            text-align: center; border: 1px solid #000; color: #000;
            vertical-align: middle; background: white !important;
            -webkit-print-color-adjust: exact; print-color-adjust: exact;
        }

        @media print {
            @page { size: A4 landscape; margin: 5mm; }
            .no-print { display: none !important; }
            body { background: white; }
            td:nth-child(1), td:nth-child(5), td:nth-child(6) { white-space: nowrap !important; direction: ltr; font-size: 11px; }
        }

        /* أوزان الأعمدة */
        th:nth-child(1) { width: 18%; } th:nth-child(2) { width: 4%; } th:nth-child(3) { width: 4%; } 
        th:nth-child(4) { width: 38%; } th:nth-child(5) { width: 9%; } th:nth-child(6) { width: 9%; } 
        th:nth-child(7) { width: 8%; } th:nth-child(8) { width: 10%; }
    </style>
</head>
<body>

<div id="activation-screen">
    <div class="text-center">
        <h2 class="fw-bold" style="color: var(--dark-blue); font-size: 42px;">تفعيل البرنامج</h2>
        <div id="display-machine-id" class="machine-id-box" style="color:red">...</div>
        <input type="text" id="activation-key-input" class="form-control mb-3 text-center" style="font-size:22px; width:400px; margin:auto;" placeholder="ACT-XXXXXX">
        <button onclick="verifyKey()" class="btn btn-primary px-5 py-3 fw-bold fs-4" style="border-radius:12px">تفعيل الآن</button>
    </div>
</div>

<div class="app-container" id="main-app" style="display:none;">
    <div class="premium-input-card no-print">
        <div class="unified-layout">
            <!-- رفع الملفات -->
            <div class="input-item" style="flex: 1;">
                <label class="label-style">Upload Excel Files</label>
                <input type="file" id="fileInput" multiple accept=".xlsx, .xls" class="custom-control">
            </div>

            <!-- كود البحث -->
            <div class="input-item">
                <label class="label-style">Search Code</label>
                <input type="text" id="filterInput" class="custom-control" placeholder="OPEN">
            </div>

            <!-- الأزرار الثلاثة (موجودة دائماً وبنفس الحجم) -->
            <button class="btn-premium btn-view" onclick="processFiles()">
                <i class="bi bi-search"></i> View Report
            </button>
            <button class="btn-premium btn-pdf" onclick="handlePDF()">
                <i class="bi bi-file-pdf"></i> Save PDF
            </button>
            <button class="btn-premium btn-word" onclick="exportToWord()">
                <i class="bi bi-file-word"></i> Export Word
            </button>
        </div>
        <div id="status" style="text-align: center; font-weight: bold; color: #fff; display: none; margin-top: 15px;">
            <div class="spinner-border spinner-border-sm me-2"></div>Processing...
        </div>
    </div>

    <div id="report-container"></div>
</div>

<script>
    // --- تفعيل V4 ---
    function getStableID() {
        const info = [navigator.platform, navigator.userAgent, screen.width + "x" + screen.height].join('|');
        let hash = 0; for (let i = 0; i < info.length; i++) { hash = ((hash << 5) - hash) + info.charCodeAt(i); hash |= 0; }
        return "ECG-" + Math.abs(hash).toString().padStart(8, '0').slice(-8);
    }
    const machineID = getStableID();
    document.getElementById('display-machine-id').innerText = machineID;
    function getCorrectKey(id) {
        let num = id.replace(/\D+/g, '');
        let secret = (BigInt(num) * 7n + 12345n).toString();
        return "ACT-" + secret.slice(-6);
    }
    async function checkActivation() {
        let request = indexedDB.open("ECG_AUTH_V37", 1);
        request.onupgradeneeded = e => e.target.result.createObjectStore("auth");
        request.onsuccess = e => {
            let db = e.target.result;
            db.transaction("auth").objectStore("auth").get("key").onsuccess = ev => {
                if (ev.target.result === getCorrectKey(machineID)) showApp();
                else document.getElementById('activation-screen').style.display = 'flex';
            };
        };
    }
    function showApp() { document.getElementById('activation-screen').style.display = 'none'; document.getElementById('main-app').style.display = 'block'; }
    function verifyKey() {
        const input = document.getElementById('activation-key-input').value.trim().toUpperCase();
        if (input === getCorrectKey(machineID)) {
            let request = indexedDB.open("ECG_AUTH_V37", 1);
            request.onsuccess = e => { e.target.result.transaction("auth", "readwrite").objectStore("auth").put(input, "key"); location.reload(); };
        } else { alert("كود التفعيل غير صحيح!"); }
    }

    // --- المعالجة ---
    let currentData = null;
    let currentFilter = "";

    function formatDate(d) {
        if (d === 0 || d === "0") return "0";
        if (!d) return "-";
        try {
            let date = (typeof d === 'number' && d > 30000) ? new Date((d - 25569) * 86400 * 1000) : new Date(d);
            if (isNaN(date.getTime())) return d;
            const mos = ["JAN","FEB","MAR","APR","MAY","JUN","JUL","AUG","SEP","OCT","NOV","DEC"];
            return `${String(date.getDate()).padStart(2,'0')}-${mos[date.getMonth()]}-${date.getFullYear()}`;
        } catch(e) { return d; }
    }

    async function processFiles() {
        const fileInput = document.getElementById('fileInput');
        const filterInput = document.getElementById('filterInput').value.trim().toUpperCase();
        if (!fileInput.files.length || filterInput === "") return alert("Please select files.");
        document.getElementById('status').style.display = "block";
        document.getElementById('report-container').innerHTML = "";
        setTimeout(async () => {
            try {
                let groupedData = {};
                for (let file of Array.from(fileInput.files)) {
                    const data = await file.arrayBuffer();
                    const wb = window.XLSX.read(data, { cellDates: true });
                    wb.SheetNames.forEach(name => {
                        const rows = window.XLSX.utils.sheet_to_json(wb.Sheets[name], { defval: "" });
                        rows.forEach(row => {
                            if (String(row["الكود"] || "").trim().toUpperCase() === filterInput) {
                                let parts = String(row["رقم الطلب"] || "").split("-");
                                let groupKey = `${parts[0] || "EGC"}-${parts[2] || "OTHERS"}`;
                                if (!groupedData[groupKey]) groupedData[groupKey] = [];
                                groupedData[groupKey].push(row);
                            }
                        });
                    });
                }
                currentData = groupedData;
                currentFilter = filterInput;
                renderReport();
            } catch (error) { alert("Error: " + error.message); } 
            finally { document.getElementById('status').style.display = "none"; }
        }, 100);
    }

    function renderReport() {
        const container = document.getElementById('report-container');
        container.innerHTML = "";
        const keys = Object.keys(currentData).sort();
        if (keys.length === 0) return alert("No results");
        const today = new Date().toLocaleDateString('en-GB', {day:'2-digit', month:'short', year:'numeric'}).replace(/ /g, '-').toUpperCase();
        keys.forEach(groupKey => {
            let rowsHtml = currentData[groupKey].map((row) => `
                <tr>
                    <td style="direction:ltr">${row["رقم الطلب"]}</td>
                    <td>${row["REV"] === 0 || row["REV"] === "0" || !row["REV"] ? "0" : row["REV"]}</td>
                    <td>${row["CL"] || "-"}</td>
                    <td style="text-align:right; padding-right: 15px;">${row["الموضوع"]}</td>
                    <td style="direction:ltr">${formatDate(row["تاريخ الاستلام"])}</td>
                    <td style="direction:ltr">${formatDate(row["تاريخ الرد"])}</td>
                    <td>${row["الكود"]}</td>
                    <td>${row["مهندس ECG"] || "-"}</td>
                </tr>`).join('');
            container.insertAdjacentHTML('beforeend', `
                <div class="report-card">
                    <div class="dynamic-header">${groupKey} - ${currentFilter} | ${today}</div>
                    <table>
                        <thead><tr><th>رقم الطلب</th><th>REV</th><th>CL</th><th>الموضوع</th><th>تاريخ الاستلام</th><th>تاريخ الرد</th><th>الكود</th><th>مهندس ECG</th></tr></thead>
                        <tbody>${rowsHtml}</tbody>
                    </table>
                </div>`);
        });
    }

    function handlePDF() {
        if(!currentData) return alert("Please view report first");
        window.print();
    }

    // --- تصدير الوورد الموحد (Bold & Matching Sizes) ---
    async function exportToWord() {
        if (!currentData || typeof docx === 'undefined') return alert("Data or Library missing");
        const { Document, Packer, Paragraph, Table, TableRow, TableCell, TextRun, AlignmentType, WidthType, VerticalAlign, HeightRule } = docx;
        const today = new Date().toLocaleDateString('en-GB', {day:'2-digit', month:'short', year:'numeric'}).replace(/ /g, '-').toUpperCase();
        const keys = Object.keys(currentData).sort();
        const allChildren = [];

        keys.forEach((groupKey) => {
            allChildren.push(new Paragraph({
                alignment: AlignmentType.CENTER,
                spacing: { before: 400, after: 200 },
                children: [new TextRun({ text: `${groupKey}-${currentFilter} | ${today}`, bold: true, size: 42, color: "004085", font: "Cairo" })],
            }));
            const tableRows = [new TableRow({ 
                height: { value: 800, rule: HeightRule.ATLEAST }, // 40px height
                children: ["رقم الطلب", "REV", "CL", "الموضوع", "تاريخ الاستلام", "تاريخ الرد", "الكود", "مهندس ECG"].map(text => 
                    new TableCell({
                        children: [new Paragraph({ 
                            children: [new TextRun({ text, bold: true, color: "FFFFFF", size: 30, font: "Cairo" })], 
                            alignment: AlignmentType.CENTER 
                        })],
                        shading: { fill: "004085" }, verticalAlign: VerticalAlign.CENTER
                    }))
            })];
            currentData[groupKey].forEach(row => {
                tableRows.push(new TableRow({
                    height: { value: 500, rule: HeightRule.ATLEAST }, // 25px height
                    children: [
                        row["رقم الطلب"], (row["REV"] === 0 || row["REV"] === "0" || !row["REV"] ? "0" : row["REV"]), row["CL"] || "-", row["الموضوع"], 
                        formatDate(row["تاريخ الاستلام"]), formatDate(row["تاريخ الرد"]), row["الكود"], row["مهندس ECG"] || "-"
                    ].map((text, cellIdx) => new TableCell({
                        children: [new Paragraph({ 
                            children: [new TextRun({ text: String(text), size: 20, bold: true, font: "Cairo" })], 
                            alignment: cellIdx === 3 ? AlignmentType.RIGHT : AlignmentType.CENTER,
                            bidirectional: true
                        })],
                        verticalAlign: VerticalAlign.CENTER
                    }))
                }));
            });
            allChildren.push(new Table({ alignment: AlignmentType.RIGHT, width: { size: 100, type: WidthType.PERCENTAGE }, columnWidths: [2400, 600, 600, 4800, 1400, 1400, 1000, 1800], rows: tableRows }));
            allChildren.push(new Paragraph({ spacing: { after: 400 } })); 
        });

        const doc = new Document({ sections: [{ properties: { page: { size: { orientation: "landscape" } } }, children: allChildren }] });
        saveAs(await Packer.toBlob(doc), `ECG_Report_Pro_${today}.docx`);
    }

    checkActivation();
</script>
</body>
</html>
